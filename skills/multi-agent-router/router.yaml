    work_modes: [discovery, synthesis]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [task_decomposition, subagent_lineup, ownership_boundaries]
    avoid_for: [direct_implementation]
    pair_with: [multi-agent-coordinator, workflow-orchestrator]
    fallback_priority: 95
  context-manager:
    work_modes: [discovery, synthesis]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [context_packaging, architecture_snapshot, delegate_onboarding]
    avoid_for: [direct_implementation]
    pair_with: [agent-organizer, knowledge-synthesizer]
    fallback_priority: 85
  knowledge-synthesizer:
    work_modes: [synthesis]
    domains: [orchestration, docs]
    execution_type: read_only
    preferred_for: [merge_findings, conflict_resolution, concise_summary]
    avoid_for: [initial_discovery, direct_implementation]
    pair_with: [agent-organizer, reviewer]
    fallback_priority: 90
