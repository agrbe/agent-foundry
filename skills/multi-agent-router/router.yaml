decision_examples:
  - id: explain_one_function
    prompt: "What does this function do?"
    expected_mode: solo
    work_mode: discovery
    domain: backend
    recommended_agents: []
  - id: react_bug_fix
    prompt: "Fix this React rendering bug and validate the user flow."
    expected_mode: single_delegate
    work_mode: implementation
    domain: frontend
    recommended_agents: [react-specialist]
  - id: python_runtime_fix
    prompt: "Fix this Python runtime bug and add regression coverage."
    expected_mode: single_delegate
    work_mode: implementation
    domain: backend
    recommended_agents: [python-pro]
  - id: pr_review_multi_dimension
    prompt: "Review this branch for bugs, security risks, and test gaps."
    expected_mode: multi_agent
    work_mode: review
    domain: backend
    recommended_agents: [reviewer, security-auditor, qa-expert]
  - id: unclear_login_failure
    prompt: "Investigate why login sometimes fails in production; there is no repro."
    expected_mode: multi_agent
    work_mode: discovery
    domain: backend
    recommended_agents: [code-mapper, error-detective, debugger]
  - id: cohesive_cross_boundary_feature
    prompt: "Implement this small cross-boundary feature end-to-end in one cohesive path."
    expected_mode: single_delegate
    work_mode: implementation
    domain: backend
    recommended_agents: [fullstack-developer]
  - id: split_frontend_backend_feature
    prompt: "Implement this feature across frontend and backend with clearly separate ownership."
    expected_mode: multi_agent
    work_mode: implementation
    domain: backend
    recommended_agents: [frontend-developer, backend-developer]
  - id: no_strong_specialist_but_delegate
    prompt: "Make this bounded change in a stack without a strong curated specialist."
    expected_mode: single_delegate
    work_mode: implementation
    domain: backend
    recommended_agents: [worker]
