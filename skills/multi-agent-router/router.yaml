version: 1

policies:
  activation_model: both_layers
  canonical_skill: skills/multi-agent-router/SKILL.md
  prompt_summary: skills/multi-agent-router/references/prompt-summary.md
  visibility: on_override_or_spawn
  specialist_bias: prefer_specialist_when_materially_better
  generic_fallback: always_fallback_generic
  parent_thread_owns:
    - requirements
    - constraints
    - acceptance_criteria
    - key_decisions
    - final_synthesis
  explanation_rules:
    explain_delegation_advantage: true
    explain_solo_override_under_specialist_pressure: true
    explain_why_not_more_agents: true

decision_model:
  modes:
    solo:
      use_when:
        - one bounded deliverable
        - low uncertainty
        - low coordination risk
        - delegation would mostly duplicate repo reading
      avoid_when:
        - a strong specialist materially improves quality or speed
        - multiple independent review dimensions are required
        - cross-boundary work has clearly separable ownership
        - discovery or validation can run in parallel with implementation
    single_delegate:
      use_when:
        - one primary deliverable dominates the task
        - one strong specialist match clearly owns the path
        - the parent thread mainly needs to preserve context and synthesis
      avoid_when:
        - specialist fit is weak
        - the work naturally splits into independent tracks
        - delegation would block the immediate next local step
    multi_agent:
      use_when:
        - there are multiple independent workstreams
        - multiple review dimensions are requested
        - cross-boundary work has explicit ownership splits
        - read-only discovery or validation can proceed in parallel
      avoid_when:
        - work is tightly coupled and serial
        - more agents would mostly reread the same context
        - write ownership would overlap
  strong_specialist_pressure:
    - the task cleanly matches a curated route in `agent_routes`
    - the request explicitly asks for review, audit, debugging, performance, or security expertise
    - the domain is high-risk or verification-heavy
  anti_patterns:
    - delegate only because many files might be involved
    - delegate the immediate blocking step that the parent must perform next
    - use multiple write-capable delegates with overlapping ownership
    - choose multi-agent execution when one specialist can own the main path
  output_contract:
    visible_fields:
      - mode
      - primary_goal
      - work_mode
      - domain
      - selected_agents
      - why_this_is_better_than_solo
      - why_not_more_agents
      - why_not_specialists
      - parent_ownership
      - delegate_ownership
      - confidence

built_in_roles:
  default:
    role_type: generic
    execution_type: write_capable
    use_when:
      - delegation still helps but no curated specialist is a strong fit
      - the task is bounded and not domain-sensitive
  explorer:
    role_type: generic
    execution_type: read_only
    use_when:
      - discovery still helps but no curated read-only specialist is a strong fit
      - the fastest next step is evidence gathering
  worker:
    role_type: generic
    execution_type: write_capable
    use_when:
      - the work should be delegated but the repo lacks a stronger implementation specialist
      - file ownership can still be bounded clearly

work_modes:
  discovery: Reduce uncertainty before changing code or choosing a fix.
  review: Critique correctness, security, architecture, performance, or test quality.
  implementation: Make bounded code or content changes.
  validation: Run tests, checks, or targeted verification.
  synthesis: Merge multiple findings into one parent-thread decision.

domains:
  orchestration: Task decomposition, coordination, and result integration.
  frontend: Browser, UI, UX, and client runtime behavior.
  backend: APIs, services, integrations, and server-side implementation.
  security: Security review, hardening, abuse-path analysis, and compliance.
  data: Database, query, analytics, and model-adjacent work.
  infrastructure: Build, deployment, containers, cloud, and operational reliability.
  docs: Documentation, prompt behavior, and developer-facing guidance.

route_groups:
  orchestration:
    - agent-organizer
    - context-manager
    - knowledge-synthesizer
    - multi-agent-coordinator
    - task-distributor
    - workflow-orchestrator
  discovery_review:
    - code-mapper
    - search-specialist
    - reviewer
    - code-reviewer
    - architect-reviewer
    - debugger
    - error-detective
    - qa-expert
    - test-automator
    - performance-engineer
    - browser-debugger
    - accessibility-tester
  security_compliance:
    - security-auditor
    - security-engineer
    - penetration-tester
    - compliance-auditor
  frontend_ui:
    - frontend-developer
    - react-specialist
    - nextjs-developer
    - typescript-pro
    - ui-designer
    - ui-fixer
  backend_ai:
    - backend-developer
    - fullstack-developer
    - api-designer
    - mcp-developer
    - ai-engineer
    - llm-architect
    - prompt-engineer
    - python-pro
  data_database:
    - database-administrator
    - database-optimizer
    - sql-pro
    - postgres-pro
  infrastructure_ops:
    - build-engineer
    - deployment-engineer
    - devops-engineer
    - docker-expert
    - kubernetes-specialist
    - platform-engineer
  docs_and_guidance:
    - documentation-engineer
    - docs-researcher
    - technical-writer

agent_routes:
  agent-organizer:
    work_modes: [discovery, synthesis]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [task_decomposition, subagent_lineup, ownership_boundaries]
    avoid_for: [direct_implementation]
    pair_with: [multi-agent-coordinator, workflow-orchestrator]
    fallback_priority: 95
  context-manager:
    work_modes: [discovery, synthesis]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [context_packaging, architecture_snapshot, delegate_onboarding]
    avoid_for: [direct_implementation]
    pair_with: [agent-organizer, knowledge-synthesizer]
    fallback_priority: 85
  knowledge-synthesizer:
    work_modes: [synthesis]
    domains: [orchestration, docs]
    execution_type: read_only
    preferred_for: [merge_findings, conflict_resolution, concise_summary]
    avoid_for: [initial_discovery, direct_implementation]
    pair_with: [agent-organizer, reviewer]
    fallback_priority: 90
  multi-agent-coordinator:
    work_modes: [discovery, synthesis]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [parallel_plan, dependency_management, integration_checkpoints]
    avoid_for: [direct_implementation]
    pair_with: [agent-organizer, workflow-orchestrator]
    fallback_priority: 95
  task-distributor:
    work_modes: [discovery]
    domains: [orchestration]
    execution_type: read_only
    preferred_for: [subtask_splitting, task_boundaries]
    avoid_for: [final_synthesis]
    pair_with: [agent-organizer, multi-agent-coordinator]
