    domains: [frontend, backend, data, infrastructure, docs]
    execution_type: read_only
    preferred_for: [owning_path_mapping, entrypoints, boundary_tracing]
    avoid_for: [small_obvious_changes]
    pair_with: [search-specialist, debugger]
    fallback_priority: 100
  search-specialist:
