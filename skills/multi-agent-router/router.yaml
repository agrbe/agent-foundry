version: 1

policies:
  activation_model: both_layers
  canonical_skill: skills/multi-agent-router/SKILL.md
  prompt_summary: skills/multi-agent-router/references/prompt-summary.md
  visibility: on_override_or_spawn
  specialist_bias: require_specialist_when_requirements_match
  generic_fallback: always_fallback_generic
  parent_thread_owns:
    - requirements
    - constraints
    - acceptance_criteria
    - key_decisions
    - final_synthesis
  explanation_rules:
    explain_delegation_advantage: true
    explain_solo_override_under_specialist_pressure: true
    explain_why_not_more_agents: true

decision_model:
  specialist_match_criteria:
    - the task work mode is listed in the agent route
    - the task domain is listed in the agent route
    - the request aligns with the route's preferred_for focus
    - no route avoid_for item clearly applies
  modes:
    solo:
      use_when:
        - no curated specialist cleanly matches the task requirements
        - the next local blocking step must happen before delegation can help
        - delegation would mostly duplicate repo reading after the path is already obvious
      avoid_when:
        - a curated specialist matches the task requirements
        - multiple independent review dimensions are required
        - cross-boundary work has clearly separable ownership
        - discovery or validation can run in parallel with implementation
    single_delegate:
      use_when:
        - one primary deliverable dominates the task
        - one curated specialist cleanly matches the required work mode and domain
        - the parent thread mainly needs to preserve context and synthesis
      avoid_when:
        - no curated specialist cleanly matches the task requirements
        - the work naturally splits into independent tracks
        - multiple specialists are required to cover distinct requirements
    multi_agent:
      use_when:
        - there are multiple independent workstreams
        - multiple review dimensions are requested
        - cross-boundary work has explicit ownership splits
        - read-only discovery or validation can proceed in parallel
      avoid_when:
        - work is tightly coupled and serial
        - more agents would mostly reread the same context
        - write ownership would overlap
  strong_specialist_pressure:
    - the task cleanly matches a curated route in `agent_routes`
    - the required work mode and domain both match a curated specialist route
    - the request explicitly asks for review, audit, debugging, performance, or security expertise
    - the domain is high-risk or verification-heavy
  anti_patterns:
    - delegate only because many files might be involved
    - delegate the immediate blocking step that the parent must perform next
    - use multiple write-capable delegates with overlapping ownership
    - choose multi-agent execution when one specialist can own the main path
    - stay solo when a curated specialist matches the task requirements
    - use a generic fallback when a curated specialist route is available
  output_contract:
    visible_fields:
      - mode
      - primary_goal
      - work_mode
      - domain
      - selected_agents
      - why_this_is_better_than_solo
      - why_not_more_agents
      - why_not_specialists
      - parent_ownership
      - delegate_ownership
      - confidence

built_in_roles:
  default:
    role_type: generic
    execution_type: write_capable
    use_when:
      - delegation still helps but no curated specialist matches the task requirements
      - the task is bounded and not domain-sensitive
  explorer:
    role_type: generic
    execution_type: read_only
    use_when:
      - discovery still helps but no curated read-only specialist matches the task requirements
      - the fastest next step is evidence gathering
  worker:
    role_type: generic
    execution_type: write_capable
    use_when:
      - the work should be delegated but no curated implementation specialist matches the task requirements
      - file ownership can still be bounded clearly

work_modes:
  discovery: Reduce uncertainty before changing code or choosing a fix.
  review: Critique correctness, security, architecture, performance, or test quality.
  implementation: Make bounded code or content changes.
  validation: Run tests, checks, or targeted verification.
  synthesis: Merge multiple findings into one parent-thread decision.

domains:
  orchestration: Task decomposition, coordination, and result integration.
  frontend: Browser, UI, UX, and client runtime behavior.
  backend: APIs, services, integrations, and server-side implementation.
  security: Security review, hardening, abuse-path analysis, and compliance.
  data: Database, query, analytics, and model-adjacent work.
  infrastructure: Build, deployment, containers, cloud, and operational reliability.
  docs: Documentation, prompt behavior, and developer-facing guidance.
  product: Product framing, requirements, UX, market positioning, and delivery guidance.
  developer_experience: Tooling, workflows, dependency management, and developer productivity.

